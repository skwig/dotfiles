# Default locations
windowrule = workspace 1 silent, match:class brave-browser|google-chrome
windowrule = workspace 2 silent, match:class jetbrains-rider
windowrule = workspace 5 silent, match:class Freelens
windowrule = workspace 6 silent, match:class discord
windowrule = workspace 6 silent, match:initial_title WebCord

# bitwarden
windowrule = no_screen_share on, match:class ^(Bitwarden)$

# steam
windowrule = idle_inhibit fullscreen, match:class steam

# runelite
windowrule = float on, match:initial_title ^(RuneLite\ Launcher)$

# jetbrains
windowrule = size (monitor_w*0.5) (monitor_h*0.5), match:class (.*jetbrains.*)$, match:title ^$

# hyprshot
layerrule = no_anim on, match:namespace selection

# hyprpanel
layerrule = blur on, match:namespace bar-.*

# rofi
layerrule = blur on, match:namespace rofi

# VMs
windowrule = workspace 5, fullscreen on, idle_inhibit always, match:class \.qemu-system-x86_64-wrapped, match:title (QEMU\ \(linuxvm-0\).*)
windowrule = workspace 7, idle_inhibit always, match:class Vmware

